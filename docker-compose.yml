version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        - AWS_ACCESS_KEY_ID
        - AWS_SECRET_ACCESS_KEY
    container_name: credit-risk-backend
    restart: always
    env_file:
      - .env

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
    restart: always

  frontend:
    build: ./frontend
    restart: always
