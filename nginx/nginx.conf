events {}

http {
    server {
        listen 80;
        server_name creditriskml.duckdns.org;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name creditriskml.duckdns.org;

        ssl_certificate /etc/letsencrypt/live/creditriskml.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/creditriskml.duckdns.org/privkey.pem;

        location / {
            proxy_pass http://frontend:3000;
        }

        location /api/ {
            proxy_pass http://backend:8000/;
        }
    }
}